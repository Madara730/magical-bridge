<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>📺 Screen Share + Control</title>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <h1>📺 Screen Share + Control</h1>
        <span class="status-badge" id="statusBadge">● Disconnected</span>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
        <button class="btn-share" id="shareBtn">🖥️ Share Screen</button>
        <button class="btn-stop" id="stopBtn" style="display:none;">⏹️ Stop</button>
        <button class="btn-control" id="controlBtn">👆 Enable Phone Control</button>
        <span class="info" id="roomInfo">📡 Not connected</span>
    </div>

    <!-- VIEWER -->
    <div class="viewer" id="viewer">
        <div class="placeholder" id="placeholder">
            <div class="icon">📺</div>
            <p>Click "Share Screen" to start</p>
            <p class="sub">Your phone will see your laptop screen</p>
        </div>
        <video id="screenVideo" autoplay playsinline style="display:none;"></video>
        <div class="remote-overlay" id="remoteOverlay">
            <div class="tap-hint">👆 Tap anywhere to control laptop</div>
        </div>
        <div class="cursor-dot" id="cursorDot"></div>
    </div>

    <!-- QR SECTION -->
    <div class="qr-section" id="qrSection">
        <img id="qrImage" src="" alt="QR Code" />
        <div class="room-id" id="roomIdDisplay">Room ID: Loading...</div>
        <div class="hint">📱 Scan with phone to connect</div>
    </div>

    <!-- BOTTOM INFO -->
    <div class="bottom-info">
        <div class="status-text" id="statusText">
            <span class="disconnected">● Not connected</span>
        </div>
        <div class="device-count" id="deviceCount">0 devices connected</div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
