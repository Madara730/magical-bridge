<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magical Universal Bridge</title>
  </head>
  <body>
    <div id="app">
      <div id="controls" class="glass-panel">
        <h1 class="gradient-text">✨ Universal Bridge</h1>
        
        <div class="input-group">
          <input type="url" id="urlInput" placeholder="Enter any URL or tunnel..." autocomplete="off" />
          <div class="action-buttons">
            <button id="goBtn" class="primary-btn">Go</button>
            <button id="bookmarkBtn" class="icon-btn" title="Bookmark URL">⭐</button>
          </div>
          <button id="screenShareBtn" class="secondary-btn" style="background: #8b5cf6;">🖥️ Share Screen to Phone</button>
          <small class="helper-text">Note: Use your tunnel URL for localhost apps!</small>
        </div>

        <div class="status-container">
          <div class="status-indicator"></div>
          <span id="statusText">Connecting...</span>
        </div>

        <div class="lists-container">
          <div class="list-section">
            <h3>Bookmarks</h3>
            <ul id="bookmarksList" class="url-list"></ul>
          </div>
          
          <div class="list-section">
            <h3>History</h3>
            <ul id="historyList" class="url-list"></ul>
          </div>
        </div>

        <div class="qr-section">
          <p>Scan to sync and control from phone:</p>
          <div id="qrcode"></div>
          <button id="copyLinkBtn" class="secondary-btn">Copy Sync Link</button>
        </div>
      </div>
      
      <div id="frame-container">
        <iframe id="displayFrame" src="about:blank" frameborder="0"></iframe>
        <video id="remoteVideo" autoplay playsinline></video>
        <div id="remoteControlOverlay">👆 Tap to control laptop screen</div>
      </div>
    </div>
    
    <!-- Container for visual remote clicks -->
    <div id="clickContainer"></div>
    
    <script type="module" src="/main.js"></script>
  </body>
</html>
